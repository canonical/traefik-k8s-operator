juju:
  channel: 3.6/stable
  model-defaults:
    test-mode: "true"
    automatically-retry-hooks: "true"
  extra-bootstrap-args: --config agent-stream=proposed

providers:
  lxd:
    enable: true
  k8s:
    enable: true
    channel: latest/edge
    bootstrap: true
    bootstrap-constraints:
      root-disk: "2G"
    features:
      load-balancer:
        l2-mode: "true"
        cidrs: "10.43.45.0/28"
      local-storage: {}
      network: {}

host:
  snaps:
    charmcraft:
