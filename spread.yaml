project: traefik-k8s-operator
path: /home/ubuntu/proj
kill-timeout: 60m
warn-timeout: 1m
backends:
  integration-test:
    type: integration-test
    systems:
    - ubuntu-24.04
environment:
  CONCIERGE: '$(HOST: echo "${CONCIERGE:-concierge.yaml}")'
  OPCLI_GIT_REF: '$(HOST: echo "${OPCLI_GIT_REF:-main}")'
exclude:
- .git
- .tox
- .venv
- .*_cache
integration-suites:
  tests/integration/:
    cwd: ./
    summary: integration tests
    backends:
    - integration-test
    auto-discover: true
    pytest-arguments-template: ""
    pytest-environment-template: |
      {% for build in artifacts.charms[0].builds if build.arch == arch %}
      CHARM_PATH={{ build.path }}
      {% endfor %}
  tests/integration/jubilant/:
    cwd: ./
    summary: jubilant integration tests
    backends:
    - integration-test
    auto-discover: true
    pytest-arguments-template: ""
    pytest-environment-template: |
      {% for build in artifacts.charms[0].builds if build.arch == arch %}
      CHARM_PATH={{ build.path }}
      {% endfor %}
    environment:
      MODULE/test_dynamic_configs_jubilant_juju4: test_dynamic_configs_jubilant
      MODULE/test_tls_multi_unit_jubilant_juju4: test_tls_multi_unit_jubilant
      CONCIERGE/test_dynamic_configs_jubilant_juju4: concierge-juju4.yaml
      CONCIERGE/test_tls_multi_unit_jubilant_juju4: concierge-juju4.yaml
