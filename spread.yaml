project: traefik-k8s-operator
path: /home/ubuntu/proj
kill-timeout: 60m
warn-timeout: 1m
backends:
  integration-test:
    type: integration-test
    pytest-invocation-mode: observability
    systems:
    - ubuntu-24.04
environment:
  CONCIERGE: '$(HOST: echo "${CONCIERGE:-concierge.yaml}")'
  OPCLI_GIT_REF: '$(HOST: echo "${OPCLI_GIT_REF:-main}")'
exclude:
- .git
- .tox
- .venv
- .*_cache
integration-suites:
  tests/integration/:
    cwd: ./
    summary: integration tests
    backends:
    - integration-test
    auto-discover: true
    environment:
      MODULE/test_dynamic_configs_jubilant-juju4: test_dynamic_configs_jubilant
      MODULE/test_tls_multi_unit_jubilant-juju4: test_tls_multi_unit_jubilant
      CONCIERGE/test_dynamic_configs_jubilant-juju4: concierge-juju4.yaml
      CONCIERGE/test_tls_multi_unit_jubilant-juju4: concierge-juju4.yaml
