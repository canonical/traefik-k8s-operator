project: traefik-k8s-operator
path: /home/ubuntu/proj
kill-timeout: 60m
warn-timeout: 1m
backends:
  integration-test:
    type: integration-test
    systems:
    - ubuntu-24.04:
    - ubuntu-24.04-arm64:
        runner: [ubuntu-24.04-arm]
environment:
  CONCIERGE: '$(HOST: echo "${CONCIERGE:-concierge-juju4.yaml}")'
  OPCLI_GIT_REF: '$(HOST: echo "${OPCLI_GIT_REF:-main}")'
exclude:
- .git
- .tox
- .venv
- .*_cache
integration-suites:
  tests/integration/:
    working-dir: ./
    summary: integration tests
    backends:
    - integration-test
    systems:
    - ubuntu-24.04
    auto-discover: true
    pytest-arguments-template: '-x --log-format="%(asctime)s %(levelname)s %(message)s" --keep-models --model testing --base {{ env.get("BASE", "ubuntu@26.04") }}'
    environment:
      # Base 20.04 tests
      BASE/legacy_test_charm_ipa_2004: ubuntu@20.04
      MODULE/legacy_test_charm_ipa_2004: tests/integration/legacy/test_charm_ipa.py
      BASE/jubilant_test_upgrade_2004: ubuntu@20.04
      MODULE/jubilant_test_upgrade_2004: tests/integration/test_upgrade.py
