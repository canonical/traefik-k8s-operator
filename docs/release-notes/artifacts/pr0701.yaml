# Version of the artifact schema
version_schema: 2
# The key holding the change(s)
changes:
  - title: Added an expose input to the Terraform module
    author: MichaelThamm
    type: minor
    description: |
      The Traefik Terraform module now accepts an optional `expose` boolean input,
      allowing users to make the application publicly available over the network
      directly from the module instead of running `juju expose` manually. It only
      takes effect when `external_hostname` is set in `config`, from which the module
      derives the `juju-external-hostname` that Juju requires before exposing a
      Kubernetes application. To restrict who can reach Traefik, use the charm's
      `loadbalancer_annotations` config.
    urls:
      pr:
        - https://github.com/canonical/traefik-k8s-operator/pull/701
      related_doc:
      related_issue:
        - https://github.com/canonical/traefik-k8s-operator/issues/699
    visibility: public
    highlight: false
