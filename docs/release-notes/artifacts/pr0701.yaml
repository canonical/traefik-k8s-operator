# Version of the artifact schema
version_schema: 2
# The key holding the change(s)
changes:
  - title: Added an expose input to the Terraform module
    author: MichaelThamm
    type: minor
    description: |
      The Traefik Terraform module now accepts an optional `expose` input, allowing
      users to make the application publicly available over the network directly from
      the module instead of running `juju expose` manually. The optional `cidrs`,
      `endpoints`, and `spaces` sub-fields restrict which CIDRs, charm endpoints, or
      network spaces can access the exposed ports.
    urls:
      pr:
        - https://github.com/canonical/traefik-k8s-operator/pull/701
      related_doc:
      related_issue:
        - https://github.com/canonical/traefik-k8s-operator/issues/699
    visibility: public
    highlight: false
