# The key holding the change(s)
changes:
  - title: Fix reading the CA certificates from the `certificate-transfer` relation.
    author: sinapah
    type: minor
    description: |
      `_update_received_ca_certs` now reads the CA certificates from the relation data using the
      `get_all_certificates` method from the `certificate-transfer` library instead of reading the
      unit databag directly.
