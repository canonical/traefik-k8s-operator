type: charm

platforms:
  ubuntu@20.04:amd64:
  ubuntu@26.04:amd64:
  ubuntu@26.04:arm64:
  ubuntu@26.04:s390x:

parts:
  charm:
    source: .
    plugin: uv
    build-packages: [git, libffi-dev, pkg-config, libssl-dev]
    build-snaps: [astral-uv, rustup]
    override-build: |
      rustup default stable
      craftctl default
      git describe --always > $CRAFT_PART_INSTALL/version
